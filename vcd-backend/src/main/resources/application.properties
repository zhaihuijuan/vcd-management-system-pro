# ========== 应用与服务端口 ==========
spring.application.name=backend
server.port=8080

# ========== HTTP 编码 ==========
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# ========== 日志 ==========
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG

# ========== 数据源（SQL Server）==========
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=vcddb_pro;encrypt=false;trustServerCertificate=true;loginTimeout=30;sendStringParametersAsUnicode=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ---------- 连接池（Hikari）----------
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ========== JPA / Hibernate ==========
# 为了确保在本地数据库已由 script.sql 初始化完成后能稳定启动，
# 暂时关闭 Hibernate 的自动建表/更新（update 可能触发额外的数据库元数据查询，导致 SQL Server 端报 802 缓冲池内存不足）。
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# ========== 静态资源（前端 dist）==========
spring.web.resources.static-locations=classpath:/dist/
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ========== Jackson（JSON）==========
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8
spring.jackson.serialization.fail-on-empty-beans=false

# ========== JWT ==========
jwt.secret=vcdManagementSystemSecretKeyWhichShouldBeAtLeast256BitsLong
jwt.expiration=86400000
